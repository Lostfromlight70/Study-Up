<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - Student Study Planner</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <div class="auth-shell">
        <section class="panel auth-panel">
            <h2>Create Your Study Planner Account</h2>
            <p>Set up a private planner profile and keep your tasks personal.</p>

            <div class="auth-forms">
                <div class="auth-box" id="signupSection">
                    <h3>Create Account</h3>
                    <form id="signupForm">
                        <div class="form-row">
                            <label for="signupName">Name</label>
                            <input type="text" id="signupName" placeholder="Your name" required />
                        </div>
                        <div class="form-row">
                            <label for="signupEmail">Email</label>
                            <input type="email" id="signupEmail" placeholder="you@example.com" required />
                        </div>
                        <div class="form-row">
                            <label for="signupPassword">Password</label>
                            <input type="password" id="signupPassword" placeholder="Password" required />
                        </div>
                        <div class="form-row">
                            <label for="signupConfirmPassword">Confirm Password</label>
                            <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required />
                        </div>
                        <button type="submit" class="primary">Sign Up</button>
                    </form>

                    <p class="auth-note">
                        Already have an account? <a href="login.html">Sign in here</a>.
                    </p>
                </div>
            </div>
        </section>
    </div>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-auth-compat.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>

</html>
