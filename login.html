<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Student Study Planner</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <div class="auth-shell">
    <section class="panel auth-panel">
      <h2>Study Planner Login</h2>
      <p>Sign in to your private study planner account to access your study schedule.</p>

      <div class="auth-forms">
        <div class="auth-box">
          <h3>Login</h3>
          <form id="loginForm">
            <div class="form-row">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" placeholder="you@example.com" required />
            </div>
            <div class="form-row">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" placeholder="Password" required />
            </div>
            <button type="submit" class="primary">Login</button>
          </form>

          <p class="auth-note">
            Don't have an account? <a href="signup.html">Create one here</a>.
          </p>
        </div>
      </div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-auth-compat.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>

</html>
